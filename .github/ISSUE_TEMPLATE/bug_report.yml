name: 问题报告
description: 报告一个可复现的交互、叙事或界面问题。
title: '[Bug] '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请勿在 Issue 中上传未经当事人同意的真人图片。
  - type: textarea
    id: summary
    attributes:
      label: 问题概述
      description: 发生了什么？预期应该如何表现？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 选择……
        3. 看到……
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 设备与浏览器
      placeholder: 例如 Android 15 / Chrome 版本
  - type: checkboxes
    id: consent
    attributes:
      label: 提交确认
      options:
        - label: 我没有上传或粘贴任何未经同意的真人照片。
          required: true
